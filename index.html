    function agruparPorSemana(datos, candidatos) {
      const semanas = {};
      datos.forEach(row => {
        const d = new Date(row.f + "T12:00:00");
        const lunes = new Date(d);
        lunes.setDate(d.getDate() - d.getDay() + 1);
        const key = lunes.toISOString().slice(0,10);
        if (!semanas[key]) semanas[key] = {counts:{},sums:{}};
        candidatos.forEach(c => {
          if (row.d[c] !== undefined && row.d[c] > 0) {
            semanas[key].sums[c] = (semanas[key].sums[c]||0) + row.d[c];
            semanas[key].counts[c] = (semanas[key].counts[c]||0) + 1;
          }
        });
      });
      return Object.entries(semanas).sort((a,b)=>a[0].localeCompare(b[0])).map(([fecha,v]) => {
        const obj = {fecha};
        candidatos.forEach(c => {
          if (v.counts[c]) obj[c] = Math.round(v.sums[c]/v.counts[c]*10)/10;
        });
        return obj;
      });
    }

      return (
        <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,padding:"10px 14px",boxShadow:"0 4px 12px rgba(0,0,0,0.1)"}}>

              <span style={{color:"#0f172a",fontSize:13}}>{p.value}%</span>
            </div>
          ))}
        </div>
      );
    };

        </div>
